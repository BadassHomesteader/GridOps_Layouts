<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridOps Layouts</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background-color: #1a1a2e;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    canvas.panning {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <canvas id="gridCanvas"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
