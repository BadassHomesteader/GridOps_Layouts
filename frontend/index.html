<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridOps Layouts</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Login splash screen ── */
    #login-screen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0078d4 100%);
    }
    .login-card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 360px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .login-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #0078d4 0%, #0f172a 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      box-shadow: 0 4px 16px rgba(0,120,212,0.35);
    }
    .login-logo svg { width: 28px; height: 28px; }
    .login-title {
      font-size: 1.375rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.375rem;
      color: #0f172a;
    }
    .login-subtitle {
      font-size: 0.875rem; color: rgba(15,23,42,0.65);
      margin-bottom: 2rem;
    }
    .login-btn {
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #0078d4 0%, #0f172a 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit; font-size: 0.9375rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; align-items: center; justify-content: center; gap: 0.625rem;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,120,212,0.35);
    }

    /* ── Main app ── */
    #app { display: none; width: 100%; height: 100%; }
    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100%;
      background-color: #f5f5f5;
      border-right: 1px solid #ddd;
      z-index: 200;
      overflow-y: auto;
      box-sizing: border-box;
    }
    canvas {
      display: block;
      width: calc(100% - 220px);
      height: 100%;
      margin-left: 220px;
      cursor: grab;
    }
    canvas.panning {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <!-- Login splash screen -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div class="login-title">GridOps Layouts</div>
      <div class="login-subtitle">Sign in to manage your warehouse layouts</div>
      <button class="login-btn" id="login-btn">
        <svg width="18" height="18" viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
        Sign in with Microsoft
      </button>
    </div>
  </div>

  <!-- Main app (hidden until authenticated) -->
  <div id="app">
    <div id="sidebar"></div>
    <canvas id="gridCanvas"></canvas>
  </div>

  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
